---
- name: Check existence of Navidrome systemd service
  ansible.builtin.stat:
    path: "{{ devture_systemd_docker_base_systemd_path }}/{{ navidrome_identifier }}.service"
  register: navidrome_service_stat

- name: Uninstall Navidrome systemd services and files
  when: navidrome_service_stat.stat.exists | bool
  block:
    - name: Ensure Navidrome systemd service is stopped
      ansible.builtin.service:
        name: "{{ navidrome_identifier }}"
        state: stopped
        enabled: false
        daemon_reload: true

    - name: Ensure Navidrome systemd service does not exist
      ansible.builtin.file:
        path: "{{ devture_systemd_docker_base_systemd_path }}/{{ navidrome_identifier }}.service"
        state: absent

    - name: Ensure Navidrome support files do not exist
      ansible.builtin.file:
        path: "{{ navidrome_base_path }}/{{ item }}"
        state: absent
      with_items:
        - env
        - labels

    - name: Ensure Navidrome local data path does not exist if empty
      ansible.builtin.command:
        cmd: "rmdir {{ navidrome_data_path }}"
      register: navidrome_data_path_deletion_result
      changed_when: navidrome_data_path_deletion_result.rc == 0
      failed_when: false

    - name: Ensure Navidrome base path does not exist if empty
      ansible.builtin.command:
        cmd: "rmdir {{ navidrome_base_path }}"
      register: navidrome_base_path_deletion_result
      changed_when: navidrome_base_path_deletion_result.rc == 0
      failed_when: false

    - name: Ensure Navidrome container network does not exist
      when: navidrome_container_network_deletion_enabled
      block:
        - name: Ensure Navidrome container network does not exist via community.docker.docker_network
          when: devture_systemd_docker_base_container_network_creation_method == 'ansible-module'
          community.docker.docker_network:
            name: "{{ navidrome_container_network }}"
            state: absent
          register: navidrome_network_deletion_result

        - name: Ensure Navidrome container network does not exist via ansible.builtin.command
          when: devture_systemd_docker_base_container_network_creation_method == 'command'
          ansible.builtin.command:
            cmd: >-
              {{ devture_systemd_docker_base_host_command_docker }} network rm
              {{ navidrome_container_network }}
          register: navidrome_network_deletion_result
          changed_when: navidrome_container_network in navidrome_network_deletion_result.stdout

- name: Check existence of Navidrome local data path
  ansible.builtin.stat:
    path: "{{ navidrome_data_path }}"
  register: navidrome_data_path_stat

# We just want to notify the user. Deleting data is too destructive.
- name: Inject the message about the remaining Navidrome local data path
  when: navidrome_data_path_stat.stat.exists | bool
  ansible.builtin.set_fact:
    devture_playbook_runtime_messages_list: |
      {{
        devture_playbook_runtime_messages_list | default([])
        +
        [
          "Note: As the local Navidrome instance has been removed, some old data remains in `" + navidrome_data_path + "`. Feel free to delete it."
        ]
      }}
